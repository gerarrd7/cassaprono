<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title id="page-title">Overheat Predictor</title>
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F525;</text></svg>" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #001020;
            color: #fff;
            overflow: hidden;
        }
        /* === OCEAN ANIME === */
        .ocean-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #000e1a 0%, #001a30 35%, #002a50 70%, #003870 100%);
            z-index: 0;
            overflow: hidden;
        }
        /* Lueur de profondeur */
        .ocean-bg::before {
            content: '';
            position: absolute;
            top: 30%; left: 20%;
            width: 60%; height: 40%;
            background: radial-gradient(ellipse, rgba(0,100,200,0.18) 0%, transparent 70%);
            animation: deepGlow 8s ease-in-out infinite alternate;
        }
        @keyframes deepGlow {
            0%   { transform: translate(0,0)    scale(1);    opacity: 0.7; }
            100% { transform: translate(15%,8%) scale(1.3);  opacity: 1;   }
        }
        /* Vagues CSS */
        .wave-layer {
            position: absolute;
            width: 400%;
            left: -150%;
            border-radius: 42%;
            animation: waveRoll var(--spd) linear infinite;
        }
        .wave-layer.w1 { bottom: -70px; height: 200px; background: rgba(0,80,180,0.30); --spd: 7s;  }
        .wave-layer.w2 { bottom: -60px; height: 170px; background: rgba(0,100,210,0.22); --spd: 11s; animation-direction: reverse; }
        .wave-layer.w3 { bottom: -80px; height: 220px; background: rgba(0,130,220,0.16); --spd: 5s;  }
        .wave-layer.w4 { bottom: -40px; height: 150px; background: rgba(0,60,160,0.20);  --spd: 9s;  animation-direction: reverse; }
        @keyframes waveRoll {
            0%   { transform: translateX(0%)   rotate(0deg); }
            100% { transform: translateX(37%)  rotate(360deg); }
        }
        /* Reflet de surface */
        .ocean-shine {
            position: absolute;
            top: 0; left: -100%; right: 0;
            height: 3px;
            width: 200%;
            background: linear-gradient(90deg, transparent 0%, rgba(100,220,255,0.35) 50%, transparent 100%);
            animation: shineMove 4s linear infinite;
        }
        @keyframes shineMove {
            0%   { transform: translateX(-50%); }
            100% { transform: translateX(50%);  }
        }
        /* Bulles */
        .bubble {
            position: absolute;
            left: var(--x);
            bottom: -20px;
            width: var(--sz); height: var(--sz);
            border-radius: 50%;
            background: rgba(100,200,255,0.22);
            border: 1px solid rgba(100,220,255,0.45);
            animation: riseUp var(--dur) ease-in var(--delay) infinite;
        }
        @keyframes riseUp {
            0%   { transform: translateY(0)    scale(1);   opacity: 0.75; }
            80%  { opacity: 0.4; }
            100% { transform: translateY(-100vh) scale(1.6); opacity: 0;   }
        }
        /* === LAYOUT === */
        .page-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 2rem 1.2rem 1.5rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
            width: 100%;
        }
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .logo .over  { color: #FF3D00; }
        .logo .heat  { color: #FFD600; }
        .subtitle {
            color: rgba(255,255,255,0.72);
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }
        .version {
            display: inline-block;
            background: linear-gradient(90deg, #FF3D00, #FFD600);
            color: #1a0800;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.22rem 0.9rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        /* === CERCLE === */
        .print-signal {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 230px;
            height: 230px;
            background-color: #001428;
            border: 5px solid #FF3D00;
            border-radius: 50%;
            text-align: center;
            transition: all 0.4s;
            margin-bottom: 1.2rem;
            box-shadow: 0 0 30px rgba(255,61,0,0.28), inset 0 0 22px rgba(255,214,0,0.08);
        }
        .signal-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .signal-value {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            color: #fff;
        }
        .print-signal .init-hint {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            padding: 0 26px;
            line-height: 1.7;
        }
        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            padding: 0 20px;
            text-align: center;
            animation: loadPulse 1s ease-in-out infinite;
        }
        @keyframes loadPulse {
            0%, 100% { opacity: 0.35; }
            50%       { opacity: 1;    }
        }
        /* === COUNTDOWN === */
        .stop-signal-time {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            width: 240px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .stop-timer {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
            text-align: center;
        }
        .stop-progress {
            width: 230px;
            height: 14px;
            background: linear-gradient(90deg, #FF3D00 0%, #FFD600 100%) left / 0% 100% no-repeat #0d1c2e;
            border-radius: 20px;
        }
        .deactivate {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }
        /* === BOUTONS === */
        .button-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 280px;
        }
        .get-signal {
            width: 100%;
            height: 54px;
            border: none;
            background: linear-gradient(90deg, #FF3D00 0%, #FFD600 100%);
            border-radius: 30px;
            color: #1a0800;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 22px rgba(255,61,0,0.4);
        }
        .get-signal:hover  { transform: scale(1.02); box-shadow: 0 6px 30px rgba(255,61,0,0.55); }
        .get-signal:active { transform: scale(0.97); }
        .get-signal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-back {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 130px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-back:hover  { background: rgba(255,255,255,0.2); }
        .btn-back:active { transform: scale(0.95); }

        /* === RESPONSIVE === */
        @media (max-width: 500px) {
        }
        @media (max-width: 400px) {
            .page-wrap    { padding: 1.4rem 0.8rem 1rem; }
            .header       { margin-bottom: 1.2rem; }
            .print-signal { width: 195px; height: 195px; }
            .signal-value { font-size: 36px; }
            .stop-progress { width: 195px; }
            .button-game  { max-width: 240px; gap: 10px; }
            .get-signal   { font-size: 14px; height: 48px; }
            .logo         { font-size: 1.8rem; }
        }
        @media (max-width: 360px) {
            .page-wrap    { padding: 1rem 0.6rem 0.8rem; }
            .print-signal { width: 170px; height: 170px; }
            .signal-value { font-size: 30px; }
            .stop-progress { width: 170px; }
            .logo         { font-size: 1.5rem; }
            .subtitle     { font-size: 0.82rem; }
            .get-signal   { font-size: 13px; height: 44px; }
        }
        @media (max-height: 680px) {
            .header       { margin-bottom: 1rem; }
            .print-signal { margin-bottom: 0.7rem; }
            .stop-signal-time { margin-bottom: 0.8rem; }
            .page-wrap    { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <!-- Ocean anime -->
    <div class="ocean-bg">
        <div class="wave-layer w1"></div>
        <div class="wave-layer w2"></div>
        <div class="wave-layer w3"></div>
        <div class="wave-layer w4"></div>
        <div class="ocean-shine"></div>
        <div id="bubbles"></div>
    </div>

    <div class="page-wrap">
        <div class="header">
            <h1 class="logo" id="logo"><span class="over">Over</span><span class="heat">heat</span></h1>
            <p class="subtitle" id="subtitle">Pr&#xe9;diction intelligente</p>
            <span class="version" id="version">Version 2.0</span>
        </div>

        <div class="print-signal" id="print-signal">
            <span class="init-hint" id="init-text">Cliquez sur NEXT SIGNAL</span>
        </div>

        <div class="stop-signal-time deactivate" id="stop-block">
            <p class="stop-timer" id="stop-timer"></p>
            <div class="stop-progress" id="stop-progress"></div>
        </div>

        <div class="button-game">
            <button class="get-signal" id="get-signal">NEXT SIGNAL</button>
            <button class="btn-back" id="back-btn">Retour</button>
        </div>

    </div>

    <script src="../shared.js"></script>
    <script src="js.js"></script>
</body>
</html>
