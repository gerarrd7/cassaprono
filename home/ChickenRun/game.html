<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Chicken Run Predictor</title>
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐔</text></svg>" type="image/x-icon">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0a1a0a}

        /* Background with chicken image + breathing */
        .game-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:url('../../background/Chicken_run.png') center center/cover no-repeat;z-index:0;animation:bgBreathe 8s ease-in-out infinite}
        .game-bg::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,rgba(10,26,10,0.7) 100%)}
        @keyframes bgBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

        /* Floating feathers */
        .feather{position:fixed;font-size:1.2rem;opacity:0.3;z-index:1;animation:featherFall linear infinite}
        @keyframes featherFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:0.3}90%{opacity:0.3}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}

        .header{text-align:center;padding:1.5rem 1rem 1rem;position:relative;z-index:2}
        .logo-icon{display:inline-block;font-size:1.5rem;font-weight:900;font-family:'Orbitron',monospace;color:#fff;background:linear-gradient(135deg,#4CAF50,#8BC34A);padding:0.4rem 1.2rem;border-radius:12px;margin-bottom:0.4rem;box-shadow:0 4px 18px rgba(76,175,80,0.4)}
        .logo{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#81C784,#fff,#FFB74D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;margin-bottom:0.2rem}
        .subtitle{color:rgba(255,255,255,0.8);font-size:0.95rem;font-weight:500}
        .version{background:linear-gradient(135deg,#4CAF50,#FF9800);color:#fff;padding:0.25rem 0.9rem;border-radius:20px;font-size:0.8rem;font-weight:600;display:inline-block;margin-top:0.25rem}

        .container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1rem;position:relative;z-index:2;width:100%;max-width:440px}

        /* Circle */
        .print-signal{width:230px;height:230px;border-radius:50%;border:5px solid #4CAF50;background:#0a1a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:1rem;color:#fff;text-align:center;white-space:pre-line;box-shadow:0 0 40px rgba(76,175,80,0.25),inset 0 0 30px rgba(76,175,80,0.08);margin-bottom:1.5rem;transition:box-shadow 0.4s}
        .print-signal:hover{box-shadow:0 0 55px rgba(76,175,80,0.35),inset 0 0 40px rgba(76,175,80,0.12)}

        .signal-label{font-size:12px;text-transform:uppercase;color:rgba(255,255,255,0.7);letter-spacing:1.5px;margin-bottom:6px;font-family:'Inter',sans-serif}
        .signal-value{font-family:'Orbitron',monospace;font-size:42px;font-weight:700;color:#fff}
        .loading-text{font-size:16px;color:rgba(255,255,255,0.7);animation:pulse 1.5s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}

        /* Countdown */
        .stop-block{width:100%;max-width:300px;margin-bottom:1.5rem;transition:opacity 0.4s,transform 0.4s}
        .stop-block.deactivate{opacity:0;transform:translateY(10px);pointer-events:none}
        .stop-timer{text-align:center;color:rgba(255,255,255,0.7);font-size:0.85rem;margin-bottom:0.4rem}
        .stop-progress{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.12);overflow:hidden;background-image:linear-gradient(90deg,#4CAF50,#8BC34A);background-repeat:no-repeat;background-size:0% 100%;transition:background-size 1s linear}

        /* Difficulty toggle */
        .diff-toggle{display:flex;width:100%;max-width:300px;border-radius:50px;overflow:hidden;border:2px solid rgba(255,255,255,0.15);margin-bottom:1rem}
        .diff-option{flex:1;padding:10px 8px;border:none;color:rgba(255,255,255,0.6);font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:rgba(255,255,255,0.05);transition:all 0.3s}
        .diff-option.active{color:#fff;background:linear-gradient(135deg,#388E3C,#66BB6A);box-shadow:0 4px 18px rgba(76,175,80,0.3)}
        .diff-option.active.moyen{background:linear-gradient(135deg,#E65100,#FF9800);box-shadow:0 4px 18px rgba(230,81,0,0.3)}
        /* Predict button */
        .button-game{width:100%;max-width:300px;padding:14px;border:none;border-radius:50px;background:linear-gradient(135deg,#388E3C,#66BB6A);color:#fff;font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;box-shadow:0 6px 25px rgba(76,175,80,0.3);transition:transform 0.2s,box-shadow 0.2s;margin-bottom:0.8rem}
        .button-game:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(76,175,80,0.45)}
        .button-game:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .back-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-size:0.9rem;cursor:pointer;padding:0.5rem 1rem;transition:color 0.3s}
        .back-btn:hover{color:#fff}



        /* Responsive */

        @media(max-width:400px){
            .print-signal{width:195px;height:195px}
            .signal-value{font-size:36px}
            .logo{font-size:1.8rem}
        }
        @media(max-width:360px){
            .print-signal{width:170px;height:170px}
            .signal-value{font-size:30px}
            .logo{font-size:1.5rem}
            .diff-option{font-size:0.7rem;padding:8px}
            .button-game{font-size:0.9rem;padding:12px}
        }
        @media(max-height:680px){
            .header{padding:0.8rem 1rem 0.5rem}
            .print-signal{width:180px;height:180px;margin-bottom:1rem}
            .signal-value{font-size:32px}
            .container{padding:0.5rem}
        }
    </style>
</head>
<body>
    <div class="game-bg"></div>

    <!-- Floating feathers -->
    <script>
    (function(){for(var i=0;i<3;i++){var f=document.createElement('div');f.className='feather';f.textContent=['🪶','🐔','🍃'][i%3];f.style.left=Math.random()*100+'%';f.style.animationDuration=(8+Math.random()*10)+'s';f.style.animationDelay=(Math.random()*6)+'s';f.style.fontSize=(0.8+Math.random()*0.6)+'rem';document.body.appendChild(f);}})();
    </script>

    <div class="header">
        <div class="logo-icon">🐔 CR</div>
        <h1 class="logo">Chicken Run</h1>
        <p class="subtitle" id="subtitle">Prédiction intelligente</p>
        <span class="version" id="version">Version 2.0</span>
    </div>

    <div class="container">
        <div class="print-signal" id="print-signal"><span id="init-text">Cliquez sur
NEXT SIGNAL</span></div>

        <div class="stop-block deactivate" id="stop-block">
            <div class="stop-timer" id="stop-timer"></div>
            <div class="stop-progress" id="stop-progress"></div>
        </div>

        <div class="diff-toggle">
            <button class="diff-option active" id="opt-facile" data-diff="facile">FACILE</button>
            <button class="diff-option moyen" id="opt-moyen" data-diff="moyen">MOYEN</button>
        </div>
        <button class="button-game" id="get-signal">PRÉDICTION</button>
        <button class="back-btn" id="back-btn">← Retour</button>
    </div>

    <script src="../shared.js"></script>
    <script src="js.js"></script>
</body>
</html>
