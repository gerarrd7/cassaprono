<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title id="page-title">Play Me Predictor</title>
    <link rel="shortcut icon" href="../../icon/icon_playme.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a0a1e;
            color: #fff;
            overflow: hidden;
        }
        /* === BACKGROUND ANIME : image + zoom doux === */
        .game-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('../../autre/arrire%20play%20me.png') center center / cover no-repeat;
            z-index: 0;
            transform-origin: center;
            animation: bgBreath 12s ease-in-out infinite alternate;
        }
        @keyframes bgBreath {
            0%   { transform: scale(1);    filter: brightness(0.8); }
            100% { transform: scale(1.07); filter: brightness(1.0); }
        }
        .game-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,4,25,0.62);
        }
        /* === NOTES DE MUSIQUE FLOTTANTES === */
        .music-notes {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .note {
            position: absolute;
            bottom: -60px;
            left: var(--x);
            font-size: var(--sz);
            color: var(--col);
            animation: floatNote var(--dur) ease-in var(--delay) infinite;
            user-select: none;
        }
        @keyframes floatNote {
            0%   { transform: translateY(0)      rotate(0deg)   scale(0.7); opacity: 0;   }
            12%  { opacity: 0.9; }
            88%  { opacity: 0.4; }
            100% { transform: translateY(-108vh) rotate(200deg) scale(1.1); opacity: 0;   }
        }
        /* === BARRES EGALISEUR EN BAS === */
        .eq-bars {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 52px;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            padding: 0 4px;
            pointer-events: none;
        }
        .eq-bar {
            flex: 1;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(0deg, rgba(233,30,99,0.55) 0%, rgba(156,39,176,0.25) 100%);
            animation: eqPulse var(--spd) ease-in-out var(--dly) infinite alternate;
        }
        @keyframes eqPulse {
            0%   { height: var(--minH); }
            100% { height: var(--maxH); }
        }
        /* === LAYOUT === */
        .page-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 2rem 1.2rem 1.5rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
            width: 100%;
        }
        .logo-badge {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #F06292, #fff, #CE93D8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-icon-img {
            width: 120px;
            height: auto;
            display: block;
            margin: 0 auto 0.5rem;
            border-radius: 18px;
        }
        .subtitle {
            color: rgba(255,255,255,0.72);
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }
        .version {
            display: inline-block;
            background: linear-gradient(90deg, #E91E63, #9C27B0);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.22rem 0.9rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        /* === CERCLE === */
        .print-signal {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 230px;
            height: 230px;
            background-color: #1a0520;
            border: 5px solid #E91E63;
            border-radius: 50%;
            text-align: center;
            transition: all 0.4s;
            margin-bottom: 1.2rem;
            box-shadow: 0 0 30px rgba(233,30,99,0.28), inset 0 0 22px rgba(156,39,176,0.12);
        }
        .signal-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .signal-value {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            color: #fff;
        }
        .print-signal .init-hint {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            padding: 0 26px;
            line-height: 1.7;
        }
        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            padding: 0 20px;
            text-align: center;
            animation: loadPulse 1s ease-in-out infinite;
        }
        @keyframes loadPulse {
            0%, 100% { opacity: 0.35; }
            50%       { opacity: 1;    }
        }
        /* === COUNTDOWN === */
        .stop-signal-time {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            width: 240px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .stop-timer {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
            text-align: center;
        }
        .stop-progress {
            width: 230px;
            height: 14px;
            background: linear-gradient(90deg, #E91E63 0%, #9C27B0 100%) left / 0% 100% no-repeat #2d1030;
            border-radius: 20px;
        }
        .deactivate {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }
        /* === BOUTONS === */
        .button-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 280px;
        }
        .get-signal {
            width: 100%;
            height: 54px;
            border: none;
            background: linear-gradient(90deg, #E91E63 0%, #9C27B0 100%);
            border-radius: 30px;
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 22px rgba(233,30,99,0.35);
        }
        .get-signal:hover  { transform: scale(1.02); box-shadow: 0 6px 30px rgba(233,30,99,0.5); }
        .get-signal:active { transform: scale(0.97); }
        .get-signal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-back {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 130px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-back:hover  { background: rgba(255,255,255,0.2); }
        .btn-back:active { transform: scale(0.95); }

        /* === RESPONSIVE === */
        @media (max-width: 500px) {
        }
        @media (max-width: 400px) {
            .page-wrap    { padding: 1.4rem 0.8rem 1rem; }
            .header       { margin-bottom: 1.2rem; }
            .print-signal { width: 195px; height: 195px; }
            .signal-value { font-size: 36px; }
            .stop-progress { width: 195px; }
            .button-game  { max-width: 240px; gap: 10px; }
            .get-signal   { font-size: 14px; height: 48px; }
            .logo-badge   { font-size: 1.8rem; }
        }
        @media (max-width: 360px) {
            .page-wrap    { padding: 1rem 0.6rem 0.8rem; }
            .print-signal { width: 170px; height: 170px; }
            .signal-value { font-size: 30px; }
            .stop-progress { width: 170px; }
            .logo-badge   { font-size: 1.5rem; }
            .subtitle     { font-size: 0.82rem; }
            .get-signal   { font-size: 13px; height: 44px; }
        }
        @media (max-height: 680px) {
            .header       { margin-bottom: 1rem; }
            .print-signal { margin-bottom: 0.7rem; }
            .stop-signal-time { margin-bottom: 0.8rem; }
            .page-wrap    { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <div class="game-bg"></div>
    <!-- Notes de musique flottantes -->
    <div class="music-notes">
        <div class="note" style="--x:4%;--sz:22px;--col:rgba(233,30,99,0.75);--dur:9s;--delay:0s">&#9835;</div>
        <div class="note" style="--x:25%;--sz:26px;--col:rgba(233,30,99,0.5);--dur:8s;--delay:3s">&#9839;</div>
        <div class="note" style="--x:50%;--sz:14px;--col:rgba(233,30,99,0.6);--dur:10s;--delay:4.5s">&#9835;</div>
        <div class="note" style="--x:75%;--sz:20px;--col:rgba(233,30,99,0.45);--dur:14s;--delay:5s">&#9834;</div>
        <div class="note" style="--x:55%;--sz:28px;--col:rgba(156,39,176,0.4);--dur:11s;--delay:7s">&#9834;</div>
    </div>
    <!-- Barres egaliseur -->
    <div class="eq-bars" id="eq-bars"></div>
    <div class="page-wrap">
        <div class="header">
            <img src="../../icon/icon_playme.png" alt="Play Me" class="logo-icon-img" id="logo">
            <p class="subtitle" id="subtitle">Prediction intelligente</p>
            <span class="version" id="version">Version 2.0</span>
        </div>
        <div class="print-signal" id="print-signal">
            <span class="init-hint" id="init-text">Cliquez sur NEXT SIGNAL</span>
        </div>
        <div class="stop-signal-time deactivate" id="stop-block">
            <p class="stop-timer" id="stop-timer"></p>
            <div class="stop-progress" id="stop-progress"></div>
        </div>
        <div class="button-game">
            <button class="get-signal" id="get-signal">NEXT SIGNAL</button>
            <button class="btn-back" id="back-btn">Retour</button>
        </div>

    </div>
    <script>
        // Generateur de barres egaliseur
        (function() {
            var container = document.getElementById('eq-bars');
            for (var i = 0; i < 15; i++) {
                var bar = document.createElement('div');
                bar.className = 'eq-bar';
                var minH = (4 + Math.random() * 6).toFixed(0) + 'px';
                var maxH = (14 + Math.random() * 34).toFixed(0) + 'px';
                var spd  = (0.3 + Math.random() * 0.8).toFixed(2) + 's';
                var dly  = (Math.random() * 0.6).toFixed(2) + 's';
                bar.style.cssText = '--minH:' + minH + ';--maxH:' + maxH + ';--spd:' + spd + ';--dly:' + dly;
                container.appendChild(bar);
            }
        })();
    </script>
    <script src="../shared.js"></script>
    <script src="js.js"></script>
</body>
</html>
