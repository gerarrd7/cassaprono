<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title id="page-title">Aviatrix Predictor</title>
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>avion</text></svg>" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0820;
            color: #fff;
            overflow: hidden;
        }
        .game-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('../../autre/arrier%20aviatrx.png') center center / cover no-repeat;
            z-index: 0;
        }
        .game-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13,8,32,0.72);
        }
        .page-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 2rem 1.2rem 1.5rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            width: 100%;
        }
        .logo-aviatrix {
            font-family: 'Orbitron', monospace;
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .aviatri-text { color: #e1bee7; }
        .x-propeller  {
            color: #9c27b0;
            display: inline-block;
            animation: propSpin 2.5s linear infinite;
        }
        @keyframes propSpin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .subtitle {
            color: rgba(255,255,255,0.72);
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }
        .version {
            display: inline-block;
            background: linear-gradient(90deg, #4a148c, #9c27b0);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.22rem 0.9rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .print-signal {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 230px;
            height: 230px;
            background-color: #0d0820;
            border: 5px solid #9c27b0;
            border-radius: 50%;
            font-size: 44px;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            color: #fff;
            text-align: center;
            transition: all 0.4s;
            margin-bottom: 1.2rem;
            box-shadow: 0 0 28px rgba(156,39,176,0.25), inset 0 0 20px rgba(74,20,140,0.15);
        }
        .print-signal span {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            padding: 0 24px;
            line-height: 1.6;
            text-align: center;
        }
        .signal-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .signal-value {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            color: #fff;
        }
        .stop-signal-time {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            width: 240px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .stop-timer {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
            text-align: center;
        }
        .stop-progress {
            width: 230px;
            height: 14px;
            background: linear-gradient(90deg, #9c27b0 0%, #ce93d8 100%) left / 0% 100% no-repeat #1a0b2e;
            border-radius: 20px;
        }
        .deactivate {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }
        .button-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 280px;
        }
        .get-signal {
            width: 100%;
            height: 54px;
            border: none;
            background: linear-gradient(90deg, #4a148c 0%, #9c27b0 100%);
            border-radius: 30px;
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(156,39,176,0.35);
        }
        .get-signal:hover  { transform: scale(1.02); box-shadow: 0 6px 28px rgba(156,39,176,0.5); }
        .get-signal:active { transform: scale(0.97); }
        .get-signal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-back {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 130px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-back:hover  { background: rgba(255,255,255,0.2); }
        .btn-back:active { transform: scale(0.95); }

        /* -- animation chargement -- */
        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            text-align: center;
            padding: 0 20px;
            animation: loadPulse 1s ease-in-out infinite;
        }
        @keyframes loadPulse {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1; }
        }
        /* -- responsive -- */
        @media (max-width: 500px) {
        }
        @media (max-width: 400px) {
            .page-wrap    { padding: 1.4rem 0.8rem 1rem; }
            .header       { margin-bottom: 1.2rem; }
            .print-signal { width: 195px; height: 195px; font-size: 36px; }
            .signal-value  { font-size: 36px; }
            .stop-progress { width: 195px; }
            .button-game  { max-width: 240px; gap: 10px; }
            .get-signal   { font-size: 14px; height: 48px; }
            .logo-aviatrix { font-size: 1.9rem; }
        }
        @media (max-width: 360px) {
            .page-wrap    { padding: 1rem 0.6rem 0.8rem; }
            .print-signal { width: 170px; height: 170px; font-size: 32px; }
            .signal-value  { font-size: 30px; }
            .stop-progress { width: 170px; }
            .logo-aviatrix { font-size: 1.6rem; letter-spacing: 1px; }
            .subtitle     { font-size: 0.82rem; }
            .get-signal   { font-size: 13px; height: 44px; }
        }
        @media (max-height: 680px) {
            .header       { margin-bottom: 1rem; }
            .print-signal { margin-bottom: 0.7rem; }
            .stop-signal-time { margin-bottom: 0.8rem; }
            .page-wrap    { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <div class="game-bg"></div>
    <div class="page-wrap">
        <div class="header">
            <div class="logo-aviatrix"><span class="aviatri-text">Aviatri</span><span class="x-propeller">x</span></div>
            <p class="subtitle" id="subtitle">Systeme de prediction intelligent</p>
            <span class="version" id="version">Version 3.0 Elite</span>
        </div>

        <div class="print-signal" id="print-signal">
            <span id="init-text">Cliquez sur NEXT SIGNAL</span>
        </div>

        <div class="stop-signal-time deactivate" id="stop-block">
            <p class="stop-timer" id="stop-timer"></p>
            <div class="stop-progress" id="stop-progress"></div>
        </div>

        <p id="play-at-text" style="color:#fff;font-size:15px;font-weight:700;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,0.5);min-height:1.2em;"></p>

        <div class="button-game">
            <button class="get-signal" id="get-signal">NEXT SIGNAL</button>
            <button class="btn-back" id="back-btn">Retour</button>
        </div>

    </div>
    <script src="../shared.js"></script>
    <script src="js.js"></script>
</body>
</html>
