<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title id="page-title">Aviator Predictor</title>
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2708;</text></svg>" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #001020;
            color: #fff;
            overflow: hidden;
        }
        /* === ARRIERE-PLAN GRADIENT VIOLET/BLEU === */
        .game-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1040 0%, #2d1060 40%, #4a1080 70%, #1a0840 100%);
            z-index: 0;
        }
        .game-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(120,119,198,0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,118,117,0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(162,155,254,0.15) 0%, transparent 50%);
            animation: bgFloat 8s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0%   { opacity: 0.6; }
            100% { opacity: 1;   }
        }
        /* === LAYOUT === */
        .page-wrap {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 430px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 2rem 1.2rem 1.5rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1.8rem;
            width: 100%;
        }
        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a78bfa, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: rgba(255,255,255,0.72);
            font-size: 0.95rem;
            margin-bottom: 0.4rem;
        }
        .version {
            display: inline-block;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 800;
            padding: 0.22rem 0.9rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        /* === CERCLE === */
        .print-signal {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 230px;
            height: 230px;
            background-color: #110a28;
            border: 5px solid #7c3aed;
            border-radius: 50%;
            text-align: center;
            transition: all 0.4s;
            margin-bottom: 1.2rem;
            box-shadow: 0 0 30px rgba(124,58,237,0.28), inset 0 0 22px rgba(102,126,234,0.1);
        }
        .signal-label {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }
        .signal-value {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 900;
            color: #fff;
        }
        .print-signal .init-hint {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            padding: 0 26px;
            line-height: 1.7;
        }
        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            padding: 0 20px;
            text-align: center;
            animation: loadPulse 1s ease-in-out infinite;
        }
        @keyframes loadPulse {
            0%, 100% { opacity: 0.35; }
            50%       { opacity: 1;    }
        }
        /* === COUNTDOWN === */
        .stop-signal-time {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            width: 240px;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .stop-timer {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
            text-align: center;
        }
        .stop-progress {
            width: 230px;
            height: 14px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%) left / 0% 100% no-repeat #1a1030;
            border-radius: 20px;
        }
        .deactivate {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }
        /* === BOUTONS === */
        .button-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            max-width: 280px;
        }
        .get-signal {
            width: 100%;
            height: 54px;
            border: none;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 30px;
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 22px rgba(102,126,234,0.4);
        }
        .get-signal:hover  { transform: scale(1.02); box-shadow: 0 6px 30px rgba(102,126,234,0.55); }
        .get-signal:active { transform: scale(0.97); }
        .get-signal:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-back {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 130px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-back:hover  { background: rgba(255,255,255,0.2); }
        .btn-back:active { transform: scale(0.95); }

        /* === RESPONSIVE === */
        @media (max-width: 500px) {
        }
        @media (max-width: 400px) {
            .page-wrap    { padding: 1.4rem 0.8rem 1rem; }
            .header       { margin-bottom: 1.2rem; }
            .print-signal { width: 195px; height: 195px; }
            .signal-value { font-size: 36px; }
            .stop-progress { width: 195px; }
            .button-game  { max-width: 240px; gap: 10px; }
            .get-signal   { font-size: 14px; height: 48px; }
            .logo         { font-size: 1.8rem; }
        }
        @media (max-width: 360px) {
            .page-wrap    { padding: 1rem 0.6rem 0.8rem; }
            .print-signal { width: 170px; height: 170px; }
            .signal-value { font-size: 30px; }
            .stop-progress { width: 170px; }
            .logo         { font-size: 1.5rem; }
            .subtitle     { font-size: 0.82rem; }
            .get-signal   { font-size: 13px; height: 44px; }
        }
        @media (max-height: 680px) {
            .header       { margin-bottom: 1rem; }
            .print-signal { margin-bottom: 0.7rem; }
            .stop-signal-time { margin-bottom: 0.8rem; }
            .page-wrap    { padding-top: 1rem; }
        }
    </style>
</head>
<body>
    <div class="game-bg"></div>
    <div class="page-wrap">
        <div class="header">
            <h1 class="logo" id="logo">Aviator</h1>
            <p class="subtitle" id="subtitle">Pr&#xe9;diction intelligente</p>
            <span class="version" id="version">Version 2.0</span>
        </div>

        <div class="print-signal" id="print-signal">
            <span class="init-hint" id="init-text">Cliquez sur NEXT SIGNAL</span>
        </div>

        <div class="stop-signal-time deactivate" id="stop-block">
            <p class="stop-timer" id="stop-timer"></p>
            <div class="stop-progress" id="stop-progress"></div>
        </div>

        <p id="play-at-text" style="color:#fff;font-size:15px;font-weight:700;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,0.5);min-height:1.2em;"></p>

        <div class="button-game">
            <button class="get-signal" id="get-signal">NEXT SIGNAL</button>
            <button class="btn-back" id="back-btn">Retour</button>
        </div>

    </div>

    <script src="../shared.js"></script>
    <script src="js.js"></script>
</body>
</html>
