<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title id="page-title">Crash - Predictor Pro</title>
    <!-- Favicon temporaire en ligne -->
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💥</text></svg>" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/sty.css">
</head>
<body>
    <div class="flight-particles" id="fparticles"></div>

    <div class="app-container" id="app-container">
        <header class="header">
            <h1 class="app-title" id="app-title">Crash</h1>
            <img src="https://i.ibb.co/3yp0dbX/Background_Eraser-2023-110729349.png" alt="Lucky Jet Logo" class="app-logo">
        </header>


        <div class="main-card">
            <div class="prediction-circle">
                <div class="circle-content" id="circle-content">
                    <div class="loading-text">
                        <span>Loading...</span>
                        <div class="loading-dots">
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="predictor-section">
                <div class="predictor-title" id="predictor-title">Predictor Crash</div>
                <div id="time-display" class="time-display"></div>
            </div>
        </div>
    </div>

    <div class="button-group">
        <div id="stop-block" style="width:100%;max-width:300px;margin:0 auto 0.5rem;text-align:center;transition:opacity 0.4s;display:none;">
            <p id="stop-timer" style="color:#fff;font-size:14px;font-weight:700;margin-bottom:6px;text-shadow:0 2px 6px rgba(0,0,0,0.5);"></p>
            <div id="stop-progress" style="width:100%;height:12px;background:linear-gradient(90deg,#e74c3c 0%,#f39c12 100%) left/0% 100% no-repeat rgba(0,0,0,0.3);border-radius:20px;"></div>
        </div>
        <p id="play-at-text" style="color:#fff;font-size:15px;font-weight:700;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,0.5);min-height:1.2em;margin-bottom:0.5rem;"></p>
        <button class="btn btn-primary" id="next-round-btn">🎯 Next Round</button>
        <button class="btn btn-secondary" id="back-btn">← Retour</button>
    </div>

    <div id="alert" class="alert warning">
        <strong>⏳ Patience requise</strong><br>
        Veuillez patienter pendant <span id="time-remaining">...</span> avant d'obtenir le coefficient suivant
    </div>

    <div class="error-page" id="error-page">
        <div class="error-icon">❗️☠️</div>
        <div class="error-text" id="error-message">Désolé, an error occurred</div>
        <button class="btn btn-primary" id="error-return-btn">🔄 Retour</button>
    </div>

    
    <script src="../home/shared.js"></script>
    <script src="cash.js"></script>

</body>
</html>
